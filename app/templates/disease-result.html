
{% extends 'layout.html' %}
{% block page_body %}

<div class="an-grid">
  <section class="an-col-12 an-card an-card--hover">
    <div class="an-card__hd">
      <h2 class="an-card__title">Detection result</h2>
      <div class="an-card__sub">AI-based analysis output.</div>
    </div>
    <div class="an-card__bd">
      <div class="an-card" style="padding: 16px 16px; border: 1px solid rgba(49,98,99,0.18);">
        <div style="display:flex; gap: 12px; align-items:flex-start;">
          <div class="an-icon-box" style="width: 44px; height: 44px;">
            <i class="fa fa-bug"></i>
          </div>
          <div style="min-width:0;">
            <div style="font-weight: 1000; font-size: 14px;">Prediction</div>
            <div style="color: var(--an-muted); font-size: 13px; margin-top: 8px; line-height: 1.65;">
              {{ prediction }}
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex flex-wrap" style="gap: 10px; margin-top: 14px;">
        <a class="an-btn an-btn--primary" href="{{ url_for('disease_prediction') }}">
          <i class="fa fa-upload"></i> Detect another image
        </a>
        <a class="an-btn an-btn--ghost" href="{{ url_for('home') }}">
          <i class="fa fa-th-large"></i> Back to dashboard
        </a>
      </div>
    </div>
  </section>
</div>

{% endblock %}
